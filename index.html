<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>O Amor está no Ar.. Af</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: radial-gradient(ellipse at center, #2d0020 0%, #0f0008 100%);
      overflow: hidden;
      font-family: 'Georgia', serif;
      user-select: none;
    }

    #canvas-container {
      width: 100vw;
      height: 100vh;
      cursor: grab;
    }

    #canvas-container:active {
      cursor: grabbing;
    }

    #hint {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(224, 148, 158, 0.6);
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      pointer-events: none;
      animation: fadeHint 3s ease-in-out 1.5s forwards;
      opacity: 1;
    }

    @keyframes fadeHint {
      0%   { opacity: 1; }
      70%  { opacity: 0.5; }
      100% { opacity: 0; }
    }

    #title {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(224, 148, 158, 0.75);
      font-size: 15px;
      letter-spacing: 4px;
      text-transform: uppercase;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="title">Simplesmente, um Coração Rosinha! :D</div>
  <div id="canvas-container"></div>
  <div id="hint">Segure e arraste para girar</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <script>

    const container = document.getElementById('canvas-container');

    const scene    = new THREE.Scene();
    const camera   = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 4.5);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container.appendChild(renderer.domElement);

    // Ambient — soft base fill
    const ambient = new THREE.AmbientLight(0xffd0d8, 0.5);
    scene.add(ambient);

    const keyLight = new THREE.PointLight(0xff6b8a, 2.5, 20);
    keyLight.position.set(2, 3, 4);
    keyLight.castShadow = true;
    scene.add(keyLight);

    const rimLight = new THREE.PointLight(0xe0949e, 1.8, 20);
    rimLight.position.set(-3, -1, -3);
    scene.add(rimLight);

    const fillLight = new THREE.PointLight(0xc2185b, 1.2, 15);
    fillLight.position.set(0, -4, 2);
    scene.add(fillLight);

    function heartPoint(u, v) {

      const x = (Math.sin(u) ** 3);
      const y = (13 * Math.cos(u) - 5 * Math.cos(2 * u) - 2 * Math.cos(3 * u) - Math.cos(4 * u)) / 16;
      const z = Math.cos(v) * Math.sin(u) * 0.6;

      const r = 0.85 + 0.15 * Math.cos(v * 2);
      return new THREE.Vector3(x * r, y * r, z * r);
    }
    const SEGMENTS_U = 120;
    const SEGMENTS_V = 80;
    const positions  = [];
    const normals    = [];
    const uvCoords   = [];
    const indices    = [];

    for (let iv = 0; iv <= SEGMENTS_V; iv++) {
      for (let iu = 0; iu <= SEGMENTS_U; iu++) {
        const u = (iu / SEGMENTS_U) * Math.PI * 2;
        const v = (iv / SEGMENTS_V) * Math.PI * 2;

        const p = heartPoint(u, v);
        positions.push(p.x, p.y, p.z);
        uvCoords.push(iu / SEGMENTS_U, iv / SEGMENTS_V);

        const du = 0.001;
        const dv = 0.001;
        const pu = heartPoint(u + du, v);
        const pv = heartPoint(u, v + dv);
        const tan1 = pu.sub(p.clone());
        const tan2 = pv.sub(p.clone());
        const n = new THREE.Vector3().crossVectors(tan1, tan2).normalize();
        normals.push(n.x, n.y, n.z);
      }
    }

    for (let iv = 0; iv < SEGMENTS_V; iv++) {
      for (let iu = 0; iu < SEGMENTS_U; iu++) {
        const a = iv * (SEGMENTS_U + 1) + iu;
        const b = a + 1;
        const c = a + (SEGMENTS_U + 1);
        const d = c + 1;
        indices.push(a, c, b);
        indices.push(b, c, d);
      }
    }

    const heartGeo = new THREE.BufferGeometry();
    heartGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    heartGeo.setAttribute('normal',   new THREE.Float32BufferAttribute(normals,   3));
    heartGeo.setAttribute('uv',       new THREE.Float32BufferAttribute(uvCoords,  2));
    heartGeo.setIndex(indices);
    heartGeo.computeVertexNormals();

    const heartMat = new THREE.MeshPhongMaterial({
      color:     0xe0949e,  
      specular:  0xffd8e0,
      shininess: 80,
      emissive:  0x6b0020,
      emissiveIntensity: 0.18,
      side: THREE.FrontSide,
    });

    const heart = new THREE.Mesh(heartGeo, heartMat);
    heart.rotation.x = Math.PI * 0.05; 
    scene.add(heart);

    const sparkleCount = 280;
    const sparkleGeo   = new THREE.BufferGeometry();
    const sparklePos   = new Float32Array(sparkleCount * 3);

    for (let i = 0; i < sparkleCount; i++) {
      sparklePos[i * 3]     = (Math.random() - 0.5) * 8;
      sparklePos[i * 3 + 1] = (Math.random() - 0.5) * 8;
      sparklePos[i * 3 + 2] = (Math.random() - 0.5) * 8;
    }
    sparkleGeo.setAttribute('position', new THREE.Float32BufferAttribute(sparklePos, 3));

    const sparkleMat = new THREE.PointsMaterial({
      color: 0xffc0cb,
      size: 0.025,
      transparent: true,
      opacity: 0.7,
    });

    const sparkles = new THREE.Points(sparkleGeo, sparkleMat);
    scene.add(sparkles);

    let isDragging  = false;
    let prevX = 0, prevY = 0;
    let rotX  = 0, rotY  = 0;
    let velX  = 0.004, velY = 0;  

    container.addEventListener('mousedown', e => {
      isDragging = true;
      prevX = e.clientX;
      prevY = e.clientY;
    });

    window.addEventListener('mouseup', () => { isDragging = false; });

    window.addEventListener('mousemove', e => {
      if (!isDragging) return;
      const dx = e.clientX - prevX;
      const dy = e.clientY - prevY;
      velX = dx * 0.008;
      velY = dy * 0.008;
      rotY += dx * 0.008;
      rotX += dy * 0.008;
      prevX = e.clientX;
      prevY = e.clientY;
    });

    container.addEventListener('touchstart', e => {
      isDragging = true;
      prevX = e.touches[0].clientX;
      prevY = e.touches[0].clientY;
    });
    window.addEventListener('touchend', () => { isDragging = false; });
    window.addEventListener('touchmove', e => {
      if (!isDragging) return;
      const dx = e.touches[0].clientX - prevX;
      const dy = e.touches[0].clientY - prevY;
      velX = dx * 0.008;
      velY = dy * 0.008;
      rotY += dx * 0.008;
      rotX += dy * 0.008;
      prevX = e.touches[0].clientX;
      prevY = e.touches[0].clientY;
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      if (!isDragging) {
        velX += (0.004 - velX) * 0.02;
        velY *= 0.95;
        rotY += velX;
        rotX += velY;
      }

      rotX = Math.max(-Math.PI * 0.55, Math.min(Math.PI * 0.55, rotX));

      heart.rotation.y = rotY;
      heart.rotation.x = rotX + Math.PI * 0.05;

      const breathe = 1 + Math.sin(t * 1.4) * 0.025;
      heart.scale.setScalar(breathe);
      sparkles.rotation.y = t * 0.03;
      sparkles.rotation.x = t * 0.015;

      keyLight.intensity = 2.2 + Math.sin(t * 2.8) * 0.5;

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
